<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#C9A84C">
<title>IronForge Pro</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronForge Pro">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-dim:#8B6E2E;--gold-faint:rgba(201,168,76,0.10);--gold-border:rgba(201,168,76,0.22);
  --bg0:#080808;--bg1:#0F0F0F;--bg2:#141414;--bg3:#1C1C1C;--bg4:#242424;--bg5:#2E2E2E;
  --text:#F5F0E8;--text2:#A89F8C;--text3:#6B6459;
  --green:#27AE60;--red:#E74C3C;--blue:#3498DB;--orange:#E67E22;
  --w05:rgba(255,255,255,0.05);--w10:rgba(255,255,255,0.10);
}
html,body{height:100%;background:var(--bg0);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;animation:fadeIn .2s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;padding-bottom:90px}
.scroll::-webkit-scrollbar{display:none}

/* ── TOP BAR ── */
.topbar{background:var(--bg1);padding:14px 16px 10px;border-bottom:1px solid var(--w05);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:.5px}
.topbar-right{font-size:13px;color:var(--gold);font-weight:600;cursor:pointer}

/* ── BOTTOM NAV ── */
#bottomnav{display:flex;background:var(--bg1);border-top:1px solid var(--gold-border);padding:8px 0 20px;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;color:var(--text3)}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:.3px}
.nav-btn .dot{width:4px;height:4px;background:var(--gold);border-radius:50%;margin-top:1px;opacity:0}
.nav-btn.active .dot{opacity:1}

/* ── CARDS ── */
.card{background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--w05)}
.card.gold{border-color:var(--gold-border)}
.card.gradient{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.02))}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;letter-spacing:.3px;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97);opacity:.85}
.btn-gold{background:linear-gradient(135deg,#E8C96A,#C9A84C,#8B6E2E);color:#080808}
.btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-sm{padding:9px 16px;font-size:13px;width:auto;border-radius:8px}
.btn-danger{background:transparent;border:1.5px solid var(--red);color:var(--red)}
.btn-row{display:flex;gap:10px}

/* ── INPUTS ── */
.input-group{margin-bottom:14px}
.input-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--w10);border-radius:10px;color:var(--text);font-size:15px;padding:12px 14px;outline:none;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:none;min-height:80px}
select{-webkit-appearance:none;cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-gold{background:var(--gold-faint);border:1px solid var(--gold-border);color:var(--gold)}
.badge-green{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:var(--green)}
.badge-red{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red)}
.badge-blue{background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.3);color:var(--blue)}

/* ── PROGRESS BAR ── */
.pbar{background:var(--bg4);border-radius:99px;overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.pbar-sm{height:6px}
.pbar-md{height:8px}

/* ── SECTION HEADERS ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.sh h3{font-size:16px;font-weight:800;letter-spacing:.3px}
.sh a{font-size:13px;color:var(--gold);font-weight:600;cursor:pointer}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg3);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--w05)}
.stat-val{font-size:26px;font-weight:900;color:var(--gold);line-height:1}
.stat-unit{font-size:10px;color:var(--text3);margin-top:1px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* ── EXERCISE ITEM ── */
.ex-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:8px;border:1px solid var(--w05);cursor:pointer;transition:border-color .2s}
.ex-item:hover,.ex-item:active{border-color:var(--gold-border)}
.ex-icon{width:44px;height:44px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-weight:700;font-size:15px}
.ex-meta{font-size:12px;color:var(--text3);margin-top:2px}
.ex-action{color:var(--gold);font-size:22px;font-weight:300;padding:4px}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--w05);flex-shrink:0}
.tab-btn{flex:1;padding:12px 4px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:var(--text3);border:none;background:none;border-bottom:2.5px solid transparent;letter-spacing:.3px}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:20px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--w05)}
.modal-title{font-size:17px;font-weight:800}
.modal-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px 8px}

/* ── HOME SPECIFIC ── */
.hero-banner{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));border:1px solid var(--gold-border);border-radius:14px;padding:18px;margin-bottom:14px}
.hero-greeting{font-size:13px;color:var(--text3);letter-spacing:.5px}
.hero-name{font-size:24px;font-weight:900;margin-top:2px}
.streak-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--gold-border)}
.streak-fire{font-size:24px}
.streak-num{font-size:16px;font-weight:800;color:var(--gold)}
.streak-sub{font-size:12px;color:var(--text3)}

.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.quick-card{background:var(--bg2);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--w05);cursor:pointer;transition:border-color .2s}
.quick-card:active{border-color:var(--gold-border)}
.quick-icon{font-size:22px;margin-bottom:4px}
.quick-title{font-size:12px;font-weight:700;line-height:1.3}
.quick-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ── ACTIVE WORKOUT ── */
#active-screen{position:fixed;inset:0;z-index:50;background:var(--bg0);display:none;flex-direction:column;max-width:430px;margin:0 auto}
#active-screen.open{display:flex}
.workout-header{background:var(--bg1);padding:14px 16px;border-bottom:1px solid var(--w05)}
.workout-timer{font-size:42px;font-weight:900;color:var(--gold);text-align:center;line-height:1}
.set-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.num-input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.num-input-wrap{text-align:center}
.num-input-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.num-input-ctrl{display:flex;align-items:center;background:var(--bg3);border-radius:10px;border:1px solid var(--w10);overflow:hidden}
.num-btn{width:44px;height:48px;background:var(--bg4);border:none;color:var(--gold);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.num-val{flex:1;text-align:center;font-size:20px;font-weight:800;color:var(--text);border:none;background:transparent;outline:none}

/* ── REST TIMER ── */
#rest-overlay{position:fixed;inset:0;z-index:60;background:rgba(8,8,8,.95);display:none;flex-direction:column;align-items:center;justify-content:center;max-width:430px;margin:0 auto}
#rest-overlay.open{display:flex}
.rest-num{font-size:100px;font-weight:900;color:var(--text);line-height:1}
.rest-label{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}

/* ── CHARTS ── */
canvas{border-radius:10px}
.chart-wrap{background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--w05)}
.chart-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}

/* ── NUTRITION MACROS ── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.macro-card{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--w05)}
.macro-val{font-size:20px;font-weight:900;line-height:1}
.macro-label{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* ── TOGGLE ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--w05)}
.toggle-row:last-child{border:none}
.toggle-key{font-size:14px;color:var(--text2)}
.toggle-val{font-size:14px;font-weight:600;color:var(--text)}

/* ── PROFILE AVATAR ── */
.avatar{width:72px;height:72px;border-radius:36px;background:linear-gradient(135deg,#E8C96A,#8B6E2E);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#080808;margin:0 auto 12px}

/* ── PILL FILTER ── */
.pills{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:8px;margin-bottom:14px;padding-bottom:4px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--w10);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.pill.active{background:var(--gold-faint);border-color:var(--gold);color:var(--gold)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:800;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}

/* ── UTILS ── */
.gold{color:var(--gold)}
.dimmed{color:var(--text3)}
.small{font-size:12px}
.bold{font-weight:700}
.row{display:flex;align-items:center}
.spacer{flex:1}
.divider{height:1px;background:var(--w05);margin:12px 0}
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px 0}
.mt{margin-top:10px}
.mb{margin-bottom:10px}
.text-center{text-align:center}

/* ══════════════════════════════════════════════════════════
   PREMIUM FEATURES CSS
══════════════════════════════════════════════════════════ */

/* ── EXERCISE ANIMATION PANEL ── */
#ex-anim-wrap{background:var(--bg2);border-radius:14px;border:1px solid var(--gold-border);overflow:hidden;margin-bottom:14px;position:relative}
#ex-anim-stage{width:100%;height:200px;display:flex;align-items:center;justify-content:center;position:relative;background:linear-gradient(180deg,#0a0a0a 0%,#111 60%,#0d0d0d 100%)}
.anim-floor{position:absolute;bottom:20px;left:10%;right:10%;height:3px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent);border-radius:99px}
.anim-glow{position:absolute;bottom:22px;left:20%;right:20%;height:20px;background:radial-gradient(ellipse,rgba(201,168,76,0.15) 0%,transparent 70%)}

/* Stickman Character */
.stickman{position:relative;width:80px;height:160px;display:flex;flex-direction:column;align-items:center}
.stick-head{width:28px;height:28px;border-radius:50%;border:3px solid var(--gold);background:transparent;position:absolute;top:0;left:50%;transform:translateX(-50%)}
.stick-body{width:3px;height:50px;background:var(--gold);position:absolute;top:26px;left:50%;transform:translateX(-50%)}
.stick-arm-l,.stick-arm-r{position:absolute;width:3px;height:38px;background:var(--gold);top:36px;transform-origin:top center}
.stick-arm-l{left:calc(50% - 1.5px);transform:rotate(-45deg)}
.stick-arm-r{left:calc(50% - 1.5px);transform:rotate(45deg)}
.stick-leg-l,.stick-leg-r{position:absolute;width:3px;height:44px;background:var(--gold);top:75px;transform-origin:top center}
.stick-leg-l{left:calc(50% - 1.5px);transform:rotate(-20deg)}
.stick-leg-r{left:calc(50% - 1.5px);transform:rotate(20deg)}

/* Equipment SVGs */
.barbell-eq{position:absolute;display:flex;align-items:center;gap:0}
.barbell-bar{width:120px;height:4px;background:linear-gradient(90deg,#555,#888,#555);border-radius:2px}
.barbell-plate{width:10px;height:30px;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:3px}
.dumbbell-eq{width:60px;height:14px;display:flex;align-items:center;gap:2px}
.db-plate{width:12px;height:14px;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:2px}
.db-handle{flex:1;height:6px;background:#777;border-radius:2px}

/* Exercise Animations */
@keyframes bench-press{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes squat{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(0.75) translateY(20px)}}
@keyframes curl{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-40deg)}}
@keyframes shoulder-press{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes deadlift{0%,100%{transform:rotate(0deg) translateY(0)}40%{transform:rotate(30deg) translateY(15px)}60%{transform:rotate(30deg) translateY(15px)}}
@keyframes pullup{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}
@keyframes pushup{0%,100%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(5deg) translateY(10px)}}
@keyframes lunge{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.85) translateY(15px)}}
@keyframes run{0%,100%{transform:skewX(0deg)}50%{transform:skewX(-8deg)}}
@keyframes arm-swing{0%,100%{transform:rotate(-45deg)}50%{transform:rotate(-90deg)}}
@keyframes arm-swing2{0%,100%{transform:rotate(45deg)}50%{transform:rotate(90deg)}}
@keyframes leg-pump{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(-50deg)}}
@keyframes leg-pump2{0%,100%{transform:rotate(20deg)}50%{transform:rotate(50deg)}}
@keyframes body-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow-pulse{0%,100%{opacity:0.15}50%{opacity:0.4}}

.anim-glow{animation:glow-pulse 1.5s infinite ease-in-out}
#ex-anim-label{text-align:center;padding:8px 16px;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;background:var(--bg3);border-top:1px solid var(--w05)}

/* ── MUSCLE HEATMAP ── */
#muscle-heatmap-wrap{background:var(--bg2);border-radius:14px;border:1px solid var(--w05);padding:14px;margin-bottom:14px}
.heatmap-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.heatmap-body{display:flex;gap:16px;justify-content:center}
.heatmap-side{text-align:center}
.heatmap-side-label{font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:1px}
.muscle-svg{width:90px;height:180px}
.muscle-group{fill:var(--bg4);stroke:var(--bg5);stroke-width:1;transition:fill 0.5s ease,filter 0.5s ease;cursor:pointer}
.muscle-group.active-low{fill:rgba(201,168,76,0.3)}
.muscle-group.active-mid{fill:rgba(201,168,76,0.6)}
.muscle-group.active-high{fill:#C9A84C;filter:drop-shadow(0 0 6px rgba(201,168,76,0.6))}
.muscle-legend{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* ── ACHIEVEMENT BADGES ── */
#achievements-wrap{margin-bottom:14px}
.achievement-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ach-card{background:var(--bg2);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--w05);position:relative;transition:all 0.3s}
.ach-card.unlocked{border-color:var(--gold-border);background:linear-gradient(135deg,rgba(201,168,76,0.08),var(--bg2))}
.ach-card.locked{opacity:0.4;filter:grayscale(0.5)}
.ach-icon{font-size:26px;margin-bottom:6px;line-height:1}
.ach-name{font-size:10px;font-weight:700;color:var(--text2);line-height:1.3}
.ach-desc{font-size:9px;color:var(--text3);margin-top:3px;line-height:1.3}
.ach-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}

/* Achievement unlock animation */
@keyframes ach-unlock{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.ach-card.just-unlocked{animation:ach-unlock 0.5s ease forwards}

/* ── PREMIUM PR CELEBRATION ── */
@keyframes pr-burst{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
.pr-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#080808;padding:12px 24px;border-radius:12px;font-weight:900;font-size:14px;z-index:999;display:none;animation:slideDown 0.3s ease;box-shadow:0 8px 32px rgba(201,168,76,0.5)}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── REST TIMER UPGRADE ── */
.rest-circle{width:160px;height:160px;position:relative;margin:0 auto 20px}
.rest-circle svg{transform:rotate(-90deg)}
.rest-circle-track{fill:none;stroke:var(--bg4);stroke-width:10}
.rest-circle-fill{fill:none;stroke:var(--gold);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear;stroke-dasharray:440;stroke-dashoffset:0}
#rest-num-v2{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#rest-sec-big{font-size:52px;font-weight:900;color:var(--text);line-height:1}
#rest-label-small{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px}

/* ── WORKOUT SCREEN UPGRADE ── */
.ex-anim-inline{width:100%;height:140px;border-radius:10px;background:linear-gradient(180deg,#0a0a0a,#111);display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid var(--gold-border)}

/* ── VERSION BADGE ── */
.version-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));border:1px solid var(--gold-border);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px}

/* ── LEVEL SYSTEM ── */
.level-bar-wrap{margin-top:10px}
.level-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.level-name{font-size:13px;font-weight:800;color:var(--gold)}
.level-xp{font-size:11px;color:var(--text3)}
.level-icons{display:flex;gap:4px;margin-top:8px}
.level-icon{font-size:18px;filter:grayscale(1);opacity:0.3;transition:all 0.3s}
.level-icon.active{filter:grayscale(0);opacity:1}

</head>
<body>
<div id="app">

  <!-- ════════════════════════════════════
       HOME SCREEN
  ════════════════════════════════════ -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div>
        <div style="font-size:11px;color:var(--text3);letter-spacing:1px">IRONFORGE PRO</div>
        <div class="topbar-title" style="background:linear-gradient(90deg,#E8C96A,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Dashboard</div>
      </div>
      <div onclick="goTo('screen-profile')" style="cursor:pointer">
        <div id="home-avatar" class="avatar" style="width:40px;height:40px;border-radius:20px;font-size:16px;margin:0">IF</div>
      </div>
    </div>
    <div class="scroll">
      <!-- Hero -->
      <div class="hero-banner">
        <div class="hero-greeting" id="home-greeting">Good morning</div>
        <div class="hero-name" id="home-name">Iron Athlete 💪</div>
        <div id="streak-section" class="streak-row" style="display:none">
          <div class="streak-fire">🔥</div>
          <div>
            <div class="streak-num" id="streak-count">0 Day Streak</div>
            <div class="streak-sub">Keep the momentum!</div>
          </div>
          <div class="spacer"></div>
          <span class="badge badge-gold">ACTIVE</span>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-row">
        <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Workouts</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-week">0</div><div class="stat-label">This Week</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-prs">0</div><div class="stat-label">PRs Set</div></div>
      </div>

      <!-- Quick Actions -->
      <div class="sh"><h3>Today's Focus</h3></div>
      <div class="quick-grid">
        <div class="quick-card" onclick="goTo('screen-workout')">
          <div class="quick-icon">💪</div>
          <div class="quick-title">Start Workout</div>
          <div class="quick-sub" id="qcard-workouts">0 saved</div>
        </div>
        <div class="quick-card" onclick="goTo('screen-nutrition')">
          <div class="quick-icon">🥗</div>
          <div class="quick-title">Log Meal</div>
          <div class="quick-sub" id="qcard-cals">0 kcal today</div>
        </div>
        <div class="quick-card" onclick="goTo('screen-progress')">
          <div class="quick-icon">📊</div>
          <div class="quick-title">Progress</div>
          <div class="quick-sub" id="qcard-progress">Track body</div>
        </div>
      </div>

      <!-- Daily Goals -->
      <div class="card gold">
        <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">DAILY GOALS</div>
        <div class="gold-divider"></div>
        <div style="margin-top:10px">
          <div class="row" style="margin-bottom:6px"><span>🔥 Calories</span><span class="spacer"></span><span><b id="cal-today" class="gold">0</b> / <span id="cal-goal" class="dimmed">2500</span> kcal</span></div>
          <div class="pbar pbar-sm"><div class="pbar-fill" id="cal-bar" style="background:var(--red);width:0%"></div></div>
          <div class="row" style="margin:10px 0 6px"><span>🥩 Protein</span><span class="spacer"></span><span><b id="protein-today" class="gold">0</b>g / <span id="protein-goal" class="dimmed">180</span>g</span></div>
          <div class="pbar pbar-sm"><div class="pbar-fill" id="protein-bar" style="background:var(--green);width:0%"></div></div>
          <div class="row" style="margin:10px 0 6px"><span>💧 Water</span><span class="spacer"></span><span><b id="water-today" class="gold">0</b> / <span id="water-goal" class="dimmed">3000</span> ml</span></div>
          <div class="pbar pbar-sm"><div class="pbar-fill" id="water-bar" style="background:var(--blue);width:0%"></div></div>
        </div>
      </div>

      <!-- Achievements -->
      <div class="sh"><h3>🏆 Achievements</h3><a onclick="goTo('screen-profile');setTimeout(()=>prTab('achievements'),200)">See All</a></div>
      <div id="home-achievements" class="achievement-grid" style="margin-bottom:14px"></div>

      <!-- AI Recommendation -->
      <div class="sh"><h3>🤖 AI Recommendation</h3></div>
      <div class="card gradient" onclick="goTo('screen-workout')" style="cursor:pointer">
        <div class="row">
          <div style="flex:1">
            <div style="font-weight:800;font-size:16px" id="ai-program">Full Body 3x Week</div>
            <div style="color:var(--text3);font-size:13px;margin-top:4px" id="ai-reason">Best for building a consistent training habit.</div>
          </div>
          <div style="color:var(--gold);font-size:22px;margin-left:12px">›</div>
        </div>
      </div>

      <!-- Recent Sessions -->
      <div class="sh"><h3>Recent Sessions</h3></div>
      <div id="recent-sessions">
        <div class="empty" style="padding:20px">
          <div style="font-size:36px">🏋️</div>
          <div style="font-size:15px;color:var(--text3);margin-top:8px">No workouts yet — start training!</div>
          <button class="btn btn-gold btn-sm mt" onclick="goTo('screen-workout')" style="margin:12px auto 0;display:block">Start First Workout</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       WORKOUT SCREEN
  ════════════════════════════════════ -->
  <div class="screen" id="screen-workout">
    <div class="topbar">
      <div class="topbar-title">Workouts</div>
      <div class="topbar-right" onclick="openModal('modal-build')">+ Create</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="wTab('my')">My Workouts</button>
      <button class="tab-btn" onclick="wTab('programs')">Programs</button>
      <button class="tab-btn" onclick="wTab('library')">Library</button>
    </div>

    <!-- My Workouts -->
    <div class="scroll" id="wtab-my">
      <div id="my-workouts-list">
        <div class="empty">
          <div class="empty-icon">🏗️</div>
          <div class="empty-title">No workouts yet</div>
          <div class="empty-sub">Create a custom workout or use a Program from the Programs tab</div>
          <button class="btn btn-gold" onclick="openModal('modal-build')">Create Workout</button>
        </div>
      </div>
    </div>

    <!-- Programs -->
    <div class="scroll" id="wtab-programs" style="display:none">
      <div id="programs-list"></div>
    </div>

    <!-- Exercise Library -->
    <div class="scroll" id="wtab-library" style="display:none">
      <input type="text" placeholder="Search 50+ exercises..." id="ex-search" oninput="filterExercises()" style="margin-bottom:12px">
      <div class="pills" id="cat-pills"></div>
      <div id="ex-library-list"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PROGRESS SCREEN
  ════════════════════════════════════ -->
  <div class="screen" id="screen-progress">
    <div class="topbar">
      <div class="topbar-title">Progress</div>
      <div class="topbar-right" onclick="openModal('modal-metric')">+ Log</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="pTab('body')">Body</button>
      <button class="tab-btn" onclick="pTab('strength')">Strength</button>
      <button class="tab-btn" onclick="pTab('history')">History</button>
    </div>

    <div class="scroll" id="ptab-body">
      <div class="stat-row" id="body-stats">
        <div class="stat-card"><div class="stat-val" id="cur-weight">--</div><div class="stat-label">Weight kg</div></div>
        <div class="stat-card"><div class="stat-val" id="cur-bf">--</div><div class="stat-label">Body Fat %</div></div>
        <div class="stat-card"><div class="stat-val" id="cur-bmi">--</div><div class="stat-label">BMI</div></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">WEIGHT TREND</div>
        <canvas id="weight-chart" height="140"></canvas>
      </div>
      <div class="sh"><h3>Body Log</h3></div>
      <div id="body-log-list"></div>
    </div>

    <div class="scroll" id="ptab-strength" style="display:none">
      <div class="card gradient" style="margin-bottom:16px">
        <div style="font-size:13px;color:var(--text2);line-height:1.6">🏆 Personal Records are automatically logged when you complete a heavier set during a workout session.</div>
      </div>
      <div id="pr-list"></div>
    </div>

    <div class="scroll" id="ptab-history" style="display:none">
      <div class="chart-wrap">
        <div class="chart-title">WEEKLY VOLUME (KG)</div>
        <canvas id="volume-chart" height="140"></canvas>
      </div>
      <div class="sh"><h3>Session History</h3></div>
      <div id="session-history-list"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       NUTRITION SCREEN
  ════════════════════════════════════ -->
  <div class="screen" id="screen-nutrition">
    <div class="topbar">
      <div class="topbar-title">Nutrition</div>
      <div class="topbar-right" onclick="openModal('modal-food')">+ Log Food</div>
    </div>
    <div class="scroll">
      <!-- Calorie Summary -->
      <div class="card gold">
        <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase">TODAY'S NUTRITION</div>
        <div class="gold-divider"></div>
        <div style="display:flex;justify-content:space-around;margin:14px 0;text-align:center">
          <div><div style="font-size:44px;font-weight:900;line-height:1" id="n-cal">0</div><div class="dimmed small">calories</div></div>
          <div style="width:1px;background:var(--w10)"></div>
          <div><div style="font-size:44px;font-weight:900;color:var(--gold);line-height:1" id="n-remain">2500</div><div class="dimmed small">remaining</div></div>
        </div>
        <div class="pbar pbar-md"><div class="pbar-fill" id="n-cal-bar" style="background:var(--red);width:0%"></div></div>
        <div style="text-align:right;font-size:11px;color:var(--text3);margin-top:4px">Goal: <span id="n-cal-goal">2500</span> kcal</div>
        <div class="macro-grid">
          <div class="macro-card"><div class="macro-val" id="n-protein" style="color:var(--green)">0g</div><div class="macro-label">Protein</div></div>
          <div class="macro-card"><div class="macro-val" id="n-carbs" style="color:var(--blue)">0g</div><div class="macro-label">Carbs</div></div>
          <div class="macro-card"><div class="macro-val" id="n-fat" style="color:var(--gold)">0g</div><div class="macro-label">Fat</div></div>
          <div class="macro-card"><div class="macro-val" id="n-fiber" style="color:var(--orange)">0g</div><div class="macro-label">Fiber</div></div>
        </div>
      </div>

      <!-- Water -->
      <div class="card">
        <div class="row">
          <span style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase">💧 WATER INTAKE</span>
          <span class="spacer"></span>
          <span><b id="water-ml" class="gold">0</b> / <span class="dimmed">3000</span> ml</span>
        </div>
        <div class="pbar pbar-md" style="margin:10px 0"><div class="pbar-fill" id="w-bar" style="background:var(--blue);width:0%"></div></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px">
          <button class="btn btn-outline btn-sm" onclick="addWater(250)">+250ml</button>
          <button class="btn btn-outline btn-sm" onclick="addWater(500)">+500ml</button>
          <button class="btn btn-outline btn-sm" onclick="addWater(750)">+750ml</button>
          <button class="btn btn-outline btn-sm" onclick="addWater(1000)">+1L</button>
        </div>
      </div>

      <!-- Food Log -->
      <div class="sh"><h3>Today's Meals</h3></div>
      <div id="food-log"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PROFILE SCREEN
  ════════════════════════════════════ -->
  <div class="screen" id="screen-profile">
    <div class="topbar">
      <div class="topbar-title">Profile & Settings</div>
      <div class="topbar-right" onclick="openModal('modal-profile')">Edit</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="prTab('profile')">Profile</button>
      <button class="tab-btn" onclick="prTab('trainer')">Trainer</button>
      <button class="tab-btn" onclick="prTab('attend')">Attendance</button>
      <button class="tab-btn" onclick="prTab('achievements')">🏆</button>
      <button class="tab-btn" onclick="prTab('settings')">Settings</button>
    </div>

    <!-- Level system on profile -->
    <div class="scroll" id="prtab-profile">
      <div style="text-align:center;padding:20px 0">
        <div class="avatar" id="pr-avatar">IF</div>
        <div style="font-size:22px;font-weight:900" id="pr-name">Iron Athlete</div>
        <div style="margin-top:8px" id="pr-goal-badge"></div>
        <div id="level-display" style="margin-top:12px"></div>
        <button class="btn btn-outline btn-sm" style="margin:14px auto 0;display:block" onclick="openModal('modal-profile')">Edit Profile</button>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-val" id="pr-sessions">0</div><div class="stat-label">Workouts</div></div>
        <div class="stat-card"><div class="stat-val" id="pr-vol">0k</div><div class="stat-label">Vol kg</div></div>
        <div class="stat-card"><div class="stat-val" id="pr-prs">0</div><div class="stat-label">PRs</div></div>
      </div>
      <div class="card" id="pr-details"></div>
      <div class="card" style="background:var(--gold-faint);border-color:var(--gold-border);margin-top:14px">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="font-size:22px">🔒</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.6">All data stored locally on your device. No account. No cloud. No tracking. Complete privacy guaranteed.</div>
        </div>
      </div>
    </div>

    <div class="scroll" id="prtab-trainer" style="display:none">
      <div class="card gradient" style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🏆 TRAINER MODE</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.6">Manage multiple clients from one device. All client data stored locally — no cloud required.</div>
      </div>
      <button class="btn btn-gold" onclick="openModal('modal-client')" style="margin-bottom:16px">+ Add Client</button>
      <div id="client-list"></div>
    </div>

    <div class="scroll" id="prtab-attend" style="display:none">
      <div class="card gold" style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">GYM CHECK-IN</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:14px" id="attend-status">⏳ Not checked in today</div>
        <button class="btn btn-gold" id="checkin-btn" onclick="handleCheckin()">✅ Check In Now</button>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-val" id="attend-month">0</div><div class="stat-label">This Month</div></div>
        <div class="stat-card"><div class="stat-val" id="attend-total">0</div><div class="stat-label">Total Visits</div></div>
      </div>
      <div class="sh"><h3>Recent Visits</h3></div>
      <div id="attend-list"></div>
    </div>

    <div class="scroll" id="prtab-achievements" style="display:none">
      <div class="card gradient" style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">🏆 YOUR ACHIEVEMENTS</div>
        <div style="font-size:13px;color:var(--text2)" id="ach-summary">Keep training to unlock badges!</div>
      </div>
      <div id="all-achievements-grid" class="achievement-grid"></div>
    </div>

    <div class="scroll" id="prtab-settings" style="display:none">
      <div class="card">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">APP INFO</div>
        <div class="toggle-row"><span class="toggle-key">Version</span><span class="toggle-val">1.0.0</span></div>
        <div class="toggle-row"><span class="toggle-key">Storage</span><span class="toggle-val">Local Device Only</span></div>
        <div class="toggle-row"><span class="toggle-key">Cloud Sync</span><span class="toggle-val">Not Enabled</span></div>
        <div class="toggle-row"><span class="toggle-key">Analytics</span><span class="toggle-val" style="color:var(--green)">Zero Tracking ✓</span></div>
        <div class="toggle-row"><span class="toggle-key">Login Required</span><span class="toggle-val" style="color:var(--green)">None ✓</span></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">NUTRITION GOALS</div>
        <div class="input-group"><div class="input-label">Daily Calories</div><input type="number" id="set-cals" placeholder="2500" value="2500" onchange="saveGoals()"></div>
        <div class="input-group"><div class="input-label">Protein Goal (g)</div><input type="number" id="set-protein" placeholder="180" value="180" onchange="saveGoals()"></div>
        <div class="input-group"><div class="input-label">Water Goal (ml)</div><input type="number" id="set-water" placeholder="3000" value="3000" onchange="saveGoals()"></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">DATA</div>
        <button class="btn btn-danger" onclick="clearAllData()">🗑 Clear All App Data</button>
      </div>
      <div style="text-align:center;padding:30px 0 10px">
        <div style="font-size:28px;font-weight:900;background:linear-gradient(90deg,#E8C96A,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px">IRONFORGE PRO</div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px">Built for athletes. Built for privacy.</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">v1.0.0 · All features free · No account needed</div>
      </div>
    </div>
  </div>

  <!-- ════ BOTTOM NAV ════ -->
  <nav id="bottomnav">
    <button class="nav-btn active" onclick="goTo('screen-home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span><div class="dot"></div>

    <button class="nav-btn" onclick="goTo('screen-workout')">

      <span>Progress</span><div class="dot"></div>

    <button class="nav-btn" onclick="goTo('screen-nutrition')">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v10l4.24 4.24"/></svg>

    </button>
  </nav>
</div>

<!-- ════════════════════════════════════
     ACTIVE WORKOUT OVERLAY
════════════════════════════════════ -->
<div id="active-screen">
  <div class="workout-header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="cancelWorkout()" style="background:none;border:none;color:var(--red);font-size:14px;font-weight:700;cursor:pointer">✕ Cancel</button>
      <div style="text-align:center">
        <div style="font-size:12px;color:var(--text3)" id="aw-name">Workout</div>
        <div class="workout-timer" id="aw-timer">00:00</div>
      </div>
      <button onclick="finishWorkout()" style="background:none;border:none;color:var(--gold);font-size:14px;font-weight:700;cursor:pointer">Finish ›</button>
    </div>
    <div class="pbar pbar-sm"><div class="pbar-fill" id="aw-progress" style="background:var(--gold);width:0%"></div></div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:16px;padding-bottom:20px">
    <!-- Exercise nav -->
    <div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px" id="aw-ex-nav"></div>

    <!-- Current exercise -->
    <div class="card gold" id="aw-current-ex">
      <div style="font-size:20px;font-weight:900;margin-bottom:4px" id="aw-ex-name">Exercise</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px" id="aw-ex-meta">Category · Equipment</div>

const K={PROFILE:'if_profile',WORKOUTS:'if_workouts',SESSIONS:'if_sessions',METRICS:'if_metrics',NUTRITION:'if_nutrition',WATER:'if_water',ATTENDANCE:'if_attendance',PRS:'if_prs',CLIENTS:'if_clients',GOALS:'if_goals'};

function refreshHome(){
  const h=new Date().getHours();
  const greet=h<12?'Good morning ☀️':h<17?'Good afternoon 💪':'Good evening 🌙';
  document.getElementById('home-greeting').textContent=greet;
  const name=ST.profile?.name||'Iron Athlete';
  document.getElementById('home-name').textContent=name+' 💪';
  document.getElementById('home-avatar').textContent=name[0].toUpperCase();

  const streak=getStreak();
  if(streak>0){
    document.getElementById('streak-section').style.display='flex';
    document.getElementById('streak-count').textContent=streak+' Day Streak';
  }

  const week=getThisWeekSessions();
  document.getElementById('stat-total').textContent=ST.sessions.length;
  document.getElementById('stat-week').textContent=week;
  document.getElementById('stat-prs').textContent=ST.prs.length;
  document.getElementById('qcard-workouts').textContent=ST.workouts.length+' saved';

  const todayNutrition=getTodayNutrition();
  document.getElementById('qcard-cals').textContent=Math.round(todayNutrition.cal)+' kcal today';
  document.getElementById('cal-today').textContent=Math.round(todayNutrition.cal);
  document.getElementById('protein-today').textContent=Math.round(todayNutrition.p)+'g';
  document.getElementById('cal-goal').textContent=ST.goals.cals;
  document.getElementById('protein-goal').textContent=ST.goals.protein;
  document.getElementById('water-goal').textContent=ST.goals.waterMl;

  const todayW=getTodayWater();
  document.getElementById('water-today').textContent=todayW;
  document.getElementById('water-ml').textContent=todayW;

  pct('cal-bar',todayNutrition.cal,ST.goals.cals);
  pct('protein-bar',todayNutrition.p,ST.goals.protein);
  pct('water-bar',todayW,ST.goals.waterMl);

  // Recent sessions
  const rec=ST.sessions.slice(-3).reverse();
  const el=document.getElementById('recent-sessions');
  if(!rec.length){el.innerHTML=`<div class="empty" style="padding:20px"><div style="font-size:36px">🏋️</div><div style="font-size:15px;color:var(--text3);margin-top:8px">No workouts yet — start training!</div><button class="btn btn-gold btn-sm mt" onclick="goTo('screen-workout')" style="margin:12px auto 0;display:block">Start First Workout</button></div>`;return;}
  el.innerHTML=rec.map(s=>`<div class="card" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:12px"><div style="width:42px;height:42px;background:var(--bg4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px">💪</div><div style="flex:1"><div style="font-weight:700">${s.name||'Workout'}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${fmtDate(s.startedAt)} · ${s.duration||0} min · RPE ${s.rpe||7}</div></div></div></div>`).join('');

  // AI rec
  const ai=getAIRec();
  document.getElementById('ai-program').textContent=ai.name;
  document.getElementById('ai-reason').textContent=ai.reason;
}
function pct(id,val,max){const el=document.getElementById(id);if(el)el.style.width=Math.min((val/max)*100,100)+'%';}
function getStreak(){
  const dates=[...new Set(ST.sessions.map(s=>new Date(s.startedAt).toDateString()))].sort((a,b)=>new Date(b)-new Date(a));
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  for(const d of dates){const day=new Date(d);const diff=Math.round((cur-day)/86400000);if(diff<=1){streak++;cur=day;}else break;}
  return streak;
}
function getThisWeekSessions(){
  const w=new Date();w.setDate(w.getDate()-7);
  return ST.sessions.filter(s=>new Date(s.startedAt)>w).length;
}
function getTodayNutrition(){
  const t=new Date().toDateString();
  return ST.nutrition.filter(n=>n.date===t).reduce((a,n)=>({cal:a.cal+n.cal,p:a.p+n.p,c:a.c+n.c,f:a.f+n.f}),{cal:0,p:0,c:0,f:0});
}
function getTodayWater(){
  const t=new Date().toDateString();
  return ST.water.filter(w=>w.date===t).reduce((a,w)=>a+w.amt,0);
}
function getAIRec(){
  const g=ST.profile?.goal||'muscle';
  const n=ST.sessions.length;
  if(n<3)return{name:'Full Body 3x Week',reason:'Perfect for building your training foundation.'};
  if(g==='strength')return{name:'StrongLifts 5×5',reason:'Linear progression matches your strength goals.'};
  if(g==='fat_loss'||g==='conditioning')return{name:'HIIT Conditioning',reason:'Maximize calorie burn while preserving muscle.'};
  if(getThisWeekSessions()>=5)return{name:'PPL — Push Pull Legs',reason:'Your training frequency is high — PPL is ideal.'};
  return{name:'Upper / Lower Split',reason:'Optimal balance of frequency and volume for your goals.'};
}
function fmtDate(iso){
  const d=new Date(iso),t=new Date().toDateString();
  if(d.toDateString()===t)return'Today';
  const y=new Date();y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return'Yesterday';
  return d.toLocaleDateString('en',{month:'short',day:'numeric'});
}

let awState={exercises:[],curExIdx:0,curSetIdx:0,startTime:null,timer:null,completedSets:{},selectedRpe:7};
function startWorkout(wid){
  const w=ST.workouts.find(x=>x.id===wid)||PROGRAMS.find(x=>x.id===wid);if(!w)return;
  const exList=(w.exIds||[]).map(id=>EXERCISES.find(e=>e.id===id)).filter(Boolean);
  if(!exList.length){alert('No exercises found in this workout');return;}
  awState={exercises:exList,curExIdx:0,curSetIdx:0,startTime:Date.now(),timer:null,completedSets:{},selectedRpe:7,workoutName:w.name,workoutId:w.id};
  document.getElementById('aw-name').textContent=w.name;
  document.getElementById('active-screen').classList.add('open');
  startTimer();renderAWExercise();
}
function startTimer(){
  awState.timer=setInterval(()=>{
    const e=Math.floor((Date.now()-awState.startTime)/1000);
    document.getElementById('aw-timer').textContent=`${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  },1000);
}
function renderAWExercise(){
  const exs=awState.exercises;
  const i=awState.curExIdx;
  const ex=exs[i];
  if(!ex)return;

  // Nav dots
  document.getElementById('aw-ex-nav').innerHTML=exs.map((e,idx)=>{
    const done=(awState.completedSets[idx]?.length||0)>=(e.sets||3);
    const active=idx===i;
    return`<div onclick="awState.curExIdx=${idx};awState.curSetIdx=0;renderAWExercise()" style="width:36px;height:36px;border-radius:18px;background:${done?'var(--green)':active?'var(--gold)':'var(--bg4)'};color:${done||active?'#080808':'var(--text3)'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;flex-shrink:0;border:1.5px solid ${active?'var(--gold)':done?'var(--green)':'var(--w10)'}">${done?'✓':idx+1}</div>`;
  }).join('');

  document.getElementById('aw-ex-name').textContent=ex.name;
  document.getElementById('aw-ex-meta').textContent=`${ex.cat} · ${ex.eq} · ${ex.muscles}`;
  const totalSets=ex.sets||3;
  document.getElementById('aw-set-cur').textContent=awState.curSetIdx+1;
  document.getElementById('aw-set-total').textContent=totalSets;

  // Set dots
  document.getElementById('aw-set-dots').innerHTML=Array.from({length:totalSets},(_,si)=>{
    const done=si<(awState.completedSets[i]?.length||0);
    const active=si===awState.curSetIdx;
    return`<div onclick="awState.curSetIdx=${si};renderAWExercise()" style="width:34px;height:34px;border-radius:17px;background:${done?'var(--green)':active?'var(--gold)':'var(--bg4)'};color:${done||active?'#080808':'var(--text3)'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;cursor:pointer;border:1.5px solid ${active?'var(--gold)':done?'var(--green)':'var(--w10)'}">${done?'✓':si+1}</div>`;
  }).join('');

  document.getElementById('aw-weight').value=ex.targetWeight||0;
  document.getElementById('aw-reps').value=ex.reps||10;

  // Completed sets
  const done=awState.completedSets[i]||[];
  document.getElementById('aw-completed-sets').innerHTML=done.length?`<div class="card"><div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">COMPLETED SETS</div>${done.map((s,si)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--w05)"><span style="color:var(--text3);font-size:13px">Set ${si+1}</span><span style="font-size:13px;color:var(--text2)">${s.weight}kg × ${s.reps} = <b style="color:var(--gold)">${s.weight*s.reps}kg</b></span></div>`).join('')}</div>`:''

  // Tips
  if(ex.tips){document.getElementById('aw-tips').style.display='';document.getElementById('aw-tips-text').textContent=ex.tips;}
  else document.getElementById('aw-tips').style.display='none';

  // Progress
  const total=exs.reduce((a,e,idx)=>a+(e.sets||3),0);
  const comp=Object.entries(awState.completedSets).reduce((a,[idx,sets])=>a+(sets?.length||0),0);
  document.getElementById('aw-progress').style.width=Math.min((comp/total)*100,100)+'%';
}
function adjustVal(id,delta){const el=document.getElementById(id);el.value=Math.max(0,parseFloat(el.value||0)+delta);}
function completeSet(){
  const w=parseFloat(document.getElementById('aw-weight').value)||0;
  const r=parseInt(document.getElementById('aw-reps').value)||0;
  const i=awState.curExIdx;
  if(!awState.completedSets[i])awState.completedSets[i]=[];
  awState.completedSets[i].push({weight:w,reps:r,completedAt:new Date().toISOString()});
  // Check PR
  checkPR(awState.exercises[i].name,awState.exercises[i].id,w,r);
  const ex=awState.exercises[i];
  const totalSets=ex.sets||3;
  const done=awState.completedSets[i].length;
  if(done<totalSets){awState.curSetIdx=done;renderAWExercise();showRest(ex.restSec||90);}
  else if(i<awState.exercises.length-1){awState.curExIdx++;awState.curSetIdx=0;renderAWExercise();showRest(90);}
  else{renderAWExercise();setTimeout(()=>finishWorkout(),300);}
}
function checkPR(name,id,w,r){
  const vol=w*r;const existing=ST.prs.find(p=>p.exerciseName===name);
  if(!existing||vol>existing.volume){
    const pr={id:uid(),exerciseName:name,exerciseId:id,weight:w,reps:r,volume:vol,date:new Date().toISOString()};
    if(existing)ST.prs=ST.prs.filter(p=>p.exerciseName!==name);
    ST.prs.push(pr);save('prs');
  }
}

// Rest Timer
let restTimer=null;let restTotal=90;
function showRest(sec){
  restTotal=sec;document.getElementById('rest-num').textContent=sec;
  document.getElementById('rest-bar-fill').style.width='100%';
  document.getElementById('rest-overlay').classList.add('open');
  let rem=sec;
  restTimer=setInterval(()=>{
    rem--;document.getElementById('rest-num').textContent=rem;
    document.getElementById('rest-bar-fill').style.width=(rem/sec*100)+'%';
    if(rem<=0)skipRest();
  },1000);
}
function skipRest(){clearInterval(restTimer);document.getElementById('rest-overlay').classList.remove('open');}

function finishWorkout(){
  clearInterval(awState.timer);
  document.getElementById('rest-overlay').classList.remove('open');
  const totalSets=Object.values(awState.completedSets).reduce((a,s)=>a+(s?.length||0),0);
  const vol=Object.entries(awState.completedSets).reduce((a,[idx,sets])=>{
    return a+(sets?.reduce((b,s)=>b+(s.weight*s.reps),0)||0);
  },0);
  const dur=Math.round((Date.now()-awState.startTime)/60000);
  document.getElementById('finish-stats').innerHTML=`<div class="stat-row"><div class="stat-card"><div class="stat-val">${dur}</div><div class="stat-label">Minutes</div></div><div class="stat-card"><div class="stat-val">${totalSets}</div><div class="stat-label">Sets Done</div></div><div class="stat-card"><div class="stat-val">${(vol/1000).toFixed(1)}k</div><div class="stat-label">Vol kg</div></div></div>`;
  awState.selectedRpe=7;
  document.getElementById('rpe-btns').innerHTML=Array.from({length:10},(_,i)=>`<div onclick="awState.selectedRpe=${i+1};document.querySelectorAll('#rpe-btns div').forEach((b,bi)=>b.style.background=bi===${i}?'var(--gold)':'var(--bg4)');document.getElementById('rpe-hint').textContent=rpeLabels[${i}]" style="width:36px;height:36px;border-radius:8px;background:${i===6?'var(--gold)':'var(--bg4)'};color:${i===6?'#080808':'var(--text2)'};display:flex;align-items:center;justify-content:center;font-weight:800;cursor:pointer;border:1px solid var(--w10)">${i+1}</div>`).join('');
  openModal('modal-finish');
}
const rpeLabels=['Very easy','Light effort','Moderate','Somewhat hard','Hard','Hard — pushing limits','Very hard','Very hard near max','Max effort','Absolute maximum'];
function saveFinishedWorkout(){

function drawWeightChart(){
  const c=document.getElementById('weight-chart');if(!c)return;
  const ctx=c.getContext('2d');
  const data=ST.metrics.slice(-14);
  c.width=c.offsetWidth||300;c.height=140;
  ctx.clearRect(0,0,c.width,c.height);
  if(data.length<2){ctx.fillStyle='#6B6459';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('Log at least 2 entries to see chart',c.width/2,70);return;}
  const vals=data.map(m=>m.weight);const min=Math.min(...vals)-2,max=Math.max(...vals)+2;
  const W=c.width,H=c.height,pad=20;
  const x=i=>(pad+(i/(data.length-1))*(W-pad*2));
  const y=v=>(H-pad-((v-min)/(max-min))*(H-pad*2));
  ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=1;
  for(let i=0;i<4;i++){const yy=pad+i*(H-pad*2)/3;ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(W-pad,yy);ctx.stroke();}
  const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'rgba(201,168,76,0.3)');grad.addColorStop(1,'rgba(201,168,76,0)');
  ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));vals.forEach((_,i)=>{if(i>0)ctx.lineTo(x(i),y(vals[i]));});ctx.lineTo(x(data.length-1),H-pad);ctx.lineTo(x(0),H-pad);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));vals.forEach((_,i)=>{if(i>0)ctx.lineTo(x(i),y(vals[i]));});ctx.strokeStyle='#C9A84C';ctx.lineWidth=2.5;ctx.stroke();
  vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(x(i),y(v),4,0,Math.PI*2);ctx.fillStyle='#C9A84C';ctx.fill();});
}
function drawVolumeChart(){
  const c=document.getElementById('volume-chart');if(!c)return;
  const ctx=c.getContext('2d');
  c.width=c.offsetWidth||300;c.height=140;
  ctx.clearRect(0,0,c.width,c.height);
  const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d;});
  const vols=days.map(d=>ST.sessions.filter(s=>new Date(s.startedAt).toDateString()===d.toDateString()).reduce((a,s)=>a+(s.volume||0),0));
  const max=Math.max(...vols,1);const W=c.width,H=c.height,pad=20;
  const bw=(W-pad*2)/7*0.7;const gap=(W-pad*2)/7;
  vols.forEach((v,i)=>{
    const x=pad+i*gap+(gap-bw)/2;const bh=(v/max)*(H-pad*2-20);
    if(v>0){const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#E8C96A');grad.addColorStop(1,'#8B6E2E');ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(x,H-pad-bh,bw,bh,4);ctx.fill();}
    ctx.fillStyle='#6B6459';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(days[i].toLocaleDateString('en',{weekday:'short'})[0],x+bw/2,H-4);
  });
}

const GOAL_LABELS={muscle:'💪 Build Muscle',strength:'🏋️ Get Stronger',fat_loss:'🔥 Lose Fat',conditioning:'🏃 Conditioning',general:'⚡ General Fitness'};
function refreshProfile(){
  const p=ST.profile;
  const name=p?.name||'Iron Athlete';
  document.getElementById('pr-avatar').textContent=name[0].toUpperCase();
  document.getElementById('pr-name').textContent=name;
  document.getElementById('pr-goal-badge').innerHTML=p?.goal?`<span class="badge badge-gold">${GOAL_LABELS[p.goal]||p.goal}</span>`:'';
  const vol=ST.sessions.reduce((a,s)=>a+(s.volume||0),0);
  document.getElementById('pr-sessions').textContent=ST.sessions.length;
  document.getElementById('pr-vol').textContent=(vol/1000).toFixed(0)+'k';
  document.getElementById('pr-prs').textContent=ST.prs.length;
  const details=document.getElementById('pr-details');
  if(p){
    const bmi=p.weight&&p.height?(p.weight/((p.height/100)**2)).toFixed(1):null;
    details.innerHTML=[
      p.weight?`<div class="toggle-row"><span class="toggle-key">Weight</span><span class="toggle-val">${p.weight} kg</span></div>`:'',
      p.height?`<div class="toggle-row"><span class="toggle-key">Height</span><span class="toggle-val">${p.height} cm</span></div>`:'',
      p.age?`<div class="toggle-row"><span class="toggle-key">Age</span><span class="toggle-val">${p.age} years</span></div>`:'',
      bmi?`<div class="toggle-row"><span class="toggle-key">BMI</span><span class="toggle-val">${bmi}</span></div>`:'',
      `<div class="toggle-row"><span class="toggle-key">Calorie Goal</span><span class="toggle-val">${ST.goals.cals} kcal</span></div>`,
      `<div class="toggle-row"><span class="toggle-key">Protein Goal</span><span class="toggle-val">${ST.goals.protein}g</span></div>`,
    ].join('');
  }else{details.innerHTML='<div style="color:var(--text3);font-size:13px;padding:8px 0">No profile set — tap Edit to add details (all optional)</div>';}
  renderClients();
}
function saveProfile(){
  const p={name:document.getElementById('p-name').value,age:parseInt(document.getElementById('p-age').value)||null,weight:parseFloat(document.getElementById('p-weight').value)||null,height:parseFloat(document.getElementById('p-height').value)||null,goal:document.getElementById('p-goal').value,updatedAt:new Date().toISOString()};
  ST.profile=p;save('profile');closeModal('modal-profile');refreshProfile();refreshHome();
}
function openProfileModal(){
  const p=ST.profile||{};
  document.getElementById('p-name').value=p.name||'';
  document.getElementById('p-age').value=p.age||'';
  document.getElementById('p-weight').value=p.weight||'';
  document.getElementById('p-height').value=p.height||'';
  document.getElementById('p-goal').value=p.goal||'muscle';

}
function renderClients(){
  const el=document.getElementById('client-list');
  if(!ST.clients.length){el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No clients yet</div><div class="empty-sub">Add your first client to manage their training</div></div>';return;}
  el.innerHTML=ST.clients.map(c=>`<div class="card gold" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:22px;background:var(--gold-faint);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--gold)">${c.name[0].toUpperCase()}</div><div style="flex:1"><div style="font-weight:700;font-size:15px">${c.name}</div><span class="badge badge-gold">${GOAL_LABELS[c.goal]||c.goal}</span></div><button onclick="deleteClient('${c.id}')" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer">🗑</button></div>${c.notes?`<div style="font-size:13px;color:var(--text3);margin-top:8px;font-style:italic">${c.notes}</div>`:''}</div>`).join('');

function saveClient(){
  const name=document.getElementById('c-name').value.trim();if(!name){alert('Name required');return;}
  const c={id:uid(),name,goal:document.getElementById('c-goal').value,notes:document.getElementById('c-notes').value,createdAt:new Date().toISOString()};

  document.getElementById('c-name').value='';document.getElementById('c-notes').value='';
  closeModal('modal-client');renderClients();
}
function deleteClient(id){if(!confirm('Remove this client?'))return;ST.clients=ST.clients.filter(c=>c.id!==id);save('clients');renderClients();}

// Attendance
function refreshAttendance(){
  const today=new Date().toDateString();
  const todayRec=ST.attendance.find(a=>a.date===today);
  const el=document.getElementById('attend-status');
  const btn=document.getElementById('checkin-btn');
  if(!todayRec){el.textContent='⏳ Not checked in today';btn.textContent='✅ Check In Now';btn.className='btn btn-gold';}
  else if(!todayRec.checkOut){el.textContent='🟢 Currently at gym';btn.textContent='👋 Check Out';btn.className='btn btn-outline';}
  else{const dur=Math.round((new Date(todayRec.checkOut)-new Date(todayRec.checkIn))/60000);el.textContent=`✅ Session complete — ${dur} min`;btn.textContent='✅ Done for today';btn.className='btn btn-outline';btn.disabled=true;}
  const m=new Date();
  document.getElementById('attend-month').textContent=ST.attendance.filter(a=>{const d=new Date(a.date);return d.getMonth()===m.getMonth()&&d.getFullYear()===m.getFullYear();}).length;
  document.getElementById('attend-total').textContent=ST.attendance.length;
  const el2=document.getElementById('attend-list');
  el2.innerHTML=[...ST.attendance].reverse().slice(0,15).map(a=>`<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">${new Date(a.date).toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'})}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">In: ${new Date(a.checkIn).toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'})}${a.checkOut?` · Out: ${new Date(a.checkOut).toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'})}`:'  · In session'}</div></div>${a.checkOut?`<span class="badge badge-green">${Math.round((new Date(a.checkOut)-new Date(a.checkIn))/60000)} min</span>`:''}</div></div>`).join('');
}
function handleCheckin(){
  const today=new Date().toDateString();
  const rec=ST.attendance.find(a=>a.date===today);
  if(!rec){ST.attendance.push({id:uid(),date:today,checkIn:new Date().toISOString(),checkOut:null});}
  else if(!rec.checkOut){rec.checkOut=new Date().toISOString();}
  save('attendance');refreshAttendance();
}

function getStickman(animClass, eqHtml='') {
  return `
    <div class="stickman" id="anim-stickman" style="position:relative">
      <div class="stick-head"></div>
      <div class="stick-body"></div>
      <div class="stick-arm-l" id="arm-l"></div>
      <div class="stick-arm-r" id="arm-r"></div>
      <div class="stick-leg-l" id="leg-l"></div>
      <div class="stick-leg-r" id="leg-r"></div>
    </div>
    ${eqHtml}
  `;
}

function getEqHtml(eq) {
  if(eq==='barbell') return `<div class="barbell-eq" style="position:absolute;bottom:40px"><div class="barbell-plate"></div><div class="barbell-bar"></div><div class="barbell-plate"></div></div>`;
  if(eq==='dumbbell') return `<div style="position:absolute;bottom:50px;display:flex;gap:30px"><div class="dumbbell-eq"><div class="db-plate"></div><div class="db-handle"></div><div class="db-plate"></div></div><div class="dumbbell-eq"><div class="db-plate"></div><div class="db-handle"></div><div class="db-plate"></div></div></div>`;
  if(eq==='kettlebell') return `<div style="position:absolute;bottom:42px;font-size:22px">🏋️</div>`;
  if(eq==='cable') return `<div style="position:absolute;right:10px;top:20px;width:3px;height:120px;background:linear-gradient(180deg,var(--gold-dim),transparent);border-radius:99px"></div>`;
  return '';
}

function applyAnimation(animType) {
  const armL = document.getElementById('arm-l');
  const armR = document.getElementById('arm-r');
  const legL = document.getElementById('leg-l');
  const legR = document.getElementById('leg-r');
  const body = document.getElementById('anim-stickman');
  if (!armL || !armR) return;

  const dur = '1.2s';
  const slow = '1.8s';

  const presets = {
    bench:      {al:'rotate(-120deg)',ar:'rotate(120deg)',ll:'rotate(-20deg)',lr:'rotate(20deg)',body:'translateY(0)',
                  alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    squat:      {body:'scaleY(1)',bodyA:`squat ${slow} ease-in-out infinite`},
    curl:       {al:'rotate(-45deg)',ar:'rotate(45deg)',alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    press:      {al:'rotate(-160deg)',ar:'rotate(160deg)',alA:`arm-swing ${dur} ease-in-out infinite alternate`,bodyA:`body-bounce ${dur} ease-in-out infinite`},
    deadlift:   {al:'rotate(-30deg)',ar:'rotate(30deg)',bodyA:`deadlift ${slow} ease-in-out infinite`},
    pullup:     {al:'rotate(-150deg)',ar:'rotate(150deg)',bodyA:`pullup ${dur} ease-in-out infinite`},
    row:        {al:'rotate(-60deg)',ar:'rotate(60deg)',alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    lunge:      {ll:'rotate(-40deg)',lr:'rotate(40deg)',bodyA:`lunge ${slow} ease-in-out infinite`},
    run:        {alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`,
                  llA:`leg-pump ${dur} ease-in-out infinite alternate`,lrA:`leg-pump2 ${dur} ease-in-out infinite alternate`},
    rdl:        {al:'rotate(-30deg)',ar:'rotate(30deg)',bodyA:`deadlift ${slow} ease-in-out infinite`},
    hipthrust:  {ll:'rotate(-60deg)',lr:'rotate(60deg)',bodyA:`squat ${slow} ease-in-out infinite`},
    calfraise:  {bodyA:`body-bounce 0.8s ease-in-out infinite`},
    plank:      {al:'rotate(-10deg)',ar:'rotate(10deg)',ll:'rotate(-10deg)',lr:'rotate(10deg)'},
    legraise:   {llA:`leg-pump ${dur} ease-in-out infinite alternate`,lrA:`leg-pump2 ${dur} ease-in-out infinite alternate`},
    crunch:     {bodyA:`squat ${slow} ease-in-out infinite`},
    twist:      {alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    raise:      {alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    fly:        {alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    dip:        {al:'rotate(-130deg)',ar:'rotate(130deg)',bodyA:`body-bounce ${dur} ease-in-out infinite`},
    pulldown:   {al:'rotate(-130deg)',ar:'rotate(130deg)',bodyA:`body-bounce ${dur} ease-in-out infinite`},
    facepull:   {al:'rotate(-100deg)',ar:'rotate(100deg)',alA:`arm-swing 1s ease-in-out infinite alternate`,arA:`arm-swing2 1s ease-in-out infinite alternate`},
    skulls:     {al:'rotate(-100deg)',ar:'rotate(100deg)',alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
    swing:      {al:'rotate(-30deg)',ar:'rotate(30deg)',bodyA:`deadlift ${slow} ease-in-out infinite`},
    jump:       {bodyA:`pullup ${dur} ease-in-out infinite`},
    rollout:    {al:'rotate(-10deg)',ar:'rotate(10deg)',bodyA:`deadlift ${slow} ease-in-out infinite`},
    legpress:   {ll:'rotate(-60deg)',lr:'rotate(60deg)',llA:`leg-pump ${dur} ease-in-out infinite alternate`,lrA:`leg-pump2 ${dur} ease-in-out infinite alternate`},
    pushdown:   {al:'rotate(-30deg)',ar:'rotate(30deg)',alA:`arm-swing ${dur} ease-in-out infinite alternate`,arA:`arm-swing2 ${dur} ease-in-out infinite alternate`},
  };

  const p = presets[animType] || presets.run;
  if(p.al) armL.style.transform = p.al;
  if(p.ar) armR.style.transform = p.ar;
  if(p.ll) legL.style.transform = p.ll;
  if(p.lr) legR.style.transform = p.lr;
  if(p.alA) armL.style.animation = p.alA;
  if(p.arA) armR.style.animation = p.arA;
  if(p.llA) legL.style.animation = p.llA;
  if(p.lrA) legR.style.animation = p.lrA;
  if(p.bodyA && body) body.style.animation = p.bodyA;
}

function showExerciseAnimation(exId) {
  const map = ANIM_MAP[exId] || {label:'Exercise',anim:'run',eq:'body'};
  const stage = document.getElementById('ex-animator');
  const label = document.getElementById('ex-anim-label');
  if(!stage || !label) return;
  stage.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;display:flex;align-items:flex-end;justify-content:center;height:160px;width:100%';
  wrap.innerHTML = getStickman(map.anim) + getEqHtml(map.eq);
  stage.appendChild(wrap);
  label.textContent = map.label + ' — ANIMATING';
  setTimeout(() => applyAnimation(map.anim), 50);
}

function resetHeatmap(){
  document.querySelectorAll('.muscle-group').forEach(el=>{
    el.className='muscle-group';
  });
}

function showMuscleHeatmap(exId){
  resetHeatmap();
  const map = MUSCLE_MAP[exId];
  if(!map) return;
  const applyMuscles = (list) => {
    if(!list) return;
    list.forEach(entry=>{
      const [id,level]=entry.split(':');
      const el=document.getElementById(id);
      if(el) el.className=`muscle-group active-${level}`;
    });
  };
  applyMuscles(map.front);
  applyMuscles(map.back);
}

// ── ACHIEVEMENTS SYSTEM ──
const ACHIEVEMENTS = [
  {id:'first_workout',icon:'🏋️',name:'First Rep',desc:'Complete your first workout',check:()=>ST.sessions.length>=1},
  {id:'streak_3',icon:'🔥',name:'On Fire',desc:'3 day workout streak',check:()=>getStreak()>=3},
  {id:'streak_7',icon:'🌟',name:'Week Warrior',desc:'7 day workout streak',check:()=>getStreak()>=7},
  {id:'sessions_10',icon:'💪',name:'Iron Habit',desc:'Complete 10 workouts',check:()=>ST.sessions.length>=10},
  {id:'sessions_50',icon:'🦾',name:'Iron Legend',desc:'Complete 50 workouts',check:()=>ST.sessions.length>=50},
  {id:'first_pr',icon:'🏅',name:'New Record',desc:'Set your first PR',check:()=>ST.prs.length>=1},
  {id:'prs_5',icon:'🥇',name:'PR Machine',desc:'Set 5 personal records',check:()=>ST.prs.length>=5},
  {id:'nutrition_day',icon:'🥗',name:'Macro Master',desc:'Log a full day of nutrition',check:()=>{const n=getTodayNutrition();return n.cal>1200;}},
  {id:'water_goal',icon:'💧',name:'Hydrated',desc:'Hit water goal for the day',check:()=>getTodayWater()>=ST.goals.waterMl},
  {id:'volume_100k',icon:'⚡',name:'Volume King',desc:'Lift 100,000kg total volume',check:()=>ST.sessions.reduce((a,s)=>a+(s.volume||0),0)>=100000},
  {id:'early_bird',icon:'🌅',name:'Early Bird',desc:'Log a workout before 8am',check:()=>ST.sessions.some(s=>new Date(s.startedAt).getHours()<8)},
  {id:'night_owl',icon:'🦉',name:'Night Owl',desc:'Log a workout after 9pm',check:()=>ST.sessions.some(s=>new Date(s.startedAt).getHours()>=21)},
];

function getUnlockedAchs(){return ACHIEVEMENTS.filter(a=>a.check());}

function renderAchievements(containerId, limit=6){
  const el=document.getElementById(containerId);
  if(!el) return;
  const unlocked=getUnlockedAchs().map(a=>a.id);
  const list = limit ? ACHIEVEMENTS.slice(0,limit) : ACHIEVEMENTS;
  el.innerHTML=list.map(a=>{
    const isUnlocked=unlocked.includes(a.id);
    return `<div class="ach-card ${isUnlocked?'unlocked':'locked'}">
      ${isUnlocked?'<div class="ach-badge">✓</div>':''}
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
    </div>`;
  }).join('');
}

function renderAllAchievements(){
  renderAchievements('all-achievements-grid', 0);
  const unlocked=getUnlockedAchs().length;
  const el=document.getElementById('ach-summary');
  if(el) el.textContent=`${unlocked} / ${ACHIEVEMENTS.length} unlocked — Keep grinding! 💪`;
}

// ── LEVEL SYSTEM ──
function getLevel(){
  const sessions=ST.sessions.length;
  const prs=ST.prs.length;
  const xp=sessions*10+prs*5;
  const levels=[
    {name:'Rookie',icon:'🥉',min:0,max:50},
    {name:'Contender',icon:'🥈',min:50,max:150},
    {name:'Elite',icon:'🥇',min:150,max:300},
    {name:'Champion',icon:'🏆',min:300,max:600},
    {name:'Legend',icon:'👑',min:600,max:999999},
  ];
  const lvl=levels.findLast(l=>xp>=l.min)||levels[0];
  return {xp,level:lvl,pct:Math.min(((xp-lvl.min)/(lvl.max-lvl.min))*100,100)};
}

function renderLevelDisplay(){
  const el=document.getElementById('level-display');
  if(!el) return;
  const {xp,level,pct}=getLevel();
  el.innerHTML=`
    <div style="display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--gold-border);border-radius:20px;padding:6px 16px;margin-bottom:8px">
      <span style="font-size:18px">${level.icon}</span>
      <span style="font-weight:800;font-size:14px;color:var(--gold)">${level.name}</span>
      <span style="font-size:11px;color:var(--text3)">${xp} XP</span>
    </div>
    <div class="level-bar-wrap">
      <div class="pbar pbar-sm"><div class="pbar-fill" style="background:var(--gold);width:${pct}%"></div></div>
    </div>`;
}

// ── PREMIUM REST TIMER ──
let restTimer=null; let restTotal=90;
function showRest(sec){
  restTotal=sec;
  const arc=document.getElementById('rest-circle-arc');
  const bigNum=document.getElementById('rest-sec-big');
  if(arc) arc.style.strokeDashoffset='0';
  if(bigNum) bigNum.textContent=sec;
  document.getElementById('rest-overlay').classList.add('open');
  let rem=sec;
  const circumference=440;
  restTimer=setInterval(()=>{
    rem--;
    if(bigNum) bigNum.textContent=rem;
    if(arc) arc.style.strokeDashoffset=(1-(rem/sec))*circumference+'';
    if(rem<=0) skipRest();
  },1000);
}
function skipRest(){clearInterval(restTimer);document.getElementById('rest-overlay').classList.remove('open');}

// ── HOOK INTO prTab for achievements ──
const _origPrTab = prTab;
function prTab(id){
  const btns=document.querySelectorAll('#screen-profile .tab-btn');
  const map={'profile':0,'trainer':1,'attend':2,'achievements':3,'settings':4};
  document.querySelectorAll('#screen-profile .scroll').forEach(s=>s.style.display='none');
  const panel=document.getElementById('prtab-'+id);
  if(panel) panel.style.display='';
  btns.forEach((b,i)=>b.classList.toggle('active',i===map[id]));
  if(id==='attend') refreshAttendance();
  if(id==='settings') loadGoalInputs();
  if(id==='achievements') renderAllAchievements();
  if(id==='profile'){renderLevelDisplay();}
}

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('IronForge Pro SW registered'))
        .catch(err => console.log('SW failed:', err));
    });
  }
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'flex';
  });
  window.addEventListener('appinstalled', () => {
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'none';
    deferredPrompt = null;
  });
  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        const banner = document.getElementById('install-banner');
        if (banner) banner.style.display = 'none';
      });
    }
  }
</script>
